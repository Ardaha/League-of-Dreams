<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>PvP.net - Custom Game</title>
    <style>
        @font-face {
            font-family: "FRQITC01";
            src: url("assets/fonts/FRQITC01.ttf") format("truetype");
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }

        html, body {
            height: 100vh; background: #010610; color: #cdbe91;
            font-family: Tahoma, Arial, sans-serif;
            overflow: hidden; font-size: 12px; user-select: none;
            display: flex; flex-direction: column;
        }

        /* ── TOP BAR ── */
        .top-border {
            height: 26px;
            background: url("assets/border.png") repeat-x center, linear-gradient(#1f2836,#101722);
            border-bottom: 1px solid #3c4b62;
            display: flex; align-items: center; justify-content: space-between;
            padding: 0 5px 0 10px; font-size: 11px; color: #6a7e9b;
            flex-shrink: 0; -webkit-app-region: drag;
        }
        .window-controls { display: flex; gap: 12px; -webkit-app-region: no-drag; }
        .win-btn { background: none; border: none; cursor: pointer; color: #d4ac5c; font-family: monospace; font-size: 16px; font-weight: bold; }
        .win-btn:hover { color: #ffe400; text-shadow: 0 0 5px rgba(255,228,0,0.5); }

        /* ── HEADER ── */
        .header {
            height: 72px;
            background: linear-gradient(to bottom, #162235, #070c14);
            border-bottom: 2px solid #000;
            box-shadow: inset 0 1px rgba(255,255,255,.1), 0 4px 10px rgba(0,0,0,0.8);
            display: flex; align-items: center; justify-content: space-between;
            padding: 0 20px; flex-shrink: 0;
        }
        .header h2 { font-family: "FRQITC01", serif; font-size: 22px; color: #e1d1a1; letter-spacing: 1px; }
        .header-actions { display: flex; gap: 10px; align-items: center; }

        /* ── LoL Buton ── */
        .lol-btn {
            padding: 7px 18px;
            background: linear-gradient(to bottom, #1e3a5f, #0c1e35);
            border: 1px solid #3a6590; border-bottom: 2px solid #c8aa6e;
            color: #c8aa6e; font-size: 12px; font-weight: bold;
            font-family: Tahoma, Arial, sans-serif; cursor: pointer;
            text-transform: uppercase; letter-spacing: 0.5px;
            transition: filter .15s;
        }
        .lol-btn:hover { filter: brightness(1.25); }
        .lol-btn.danger {
            background: linear-gradient(to bottom, #4a1313, #220707);
            border-color: #822222; border-bottom-color: #e03030; color: #f0a0a0;
        }

        /* ── MAIN BODY ── */
        .body { flex: 1; display: flex; min-height: 0; }

        /* ── LOBİ LİSTESİ PANELİ ── */
        .lobby-list-panel {
            flex: 1; display: flex; flex-direction: column; padding: 14px 16px;
            background: #020710; border-right: 1px solid #1c2e46;
        }
        .list-toolbar {
            display: flex; align-items: center; justify-content: space-between;
            margin-bottom: 10px;
        }
        .list-toolbar span { color: #7a9bbc; font-size: 11px; text-transform: uppercase; letter-spacing: 1px; }

        /* Tablo başlığı */
        .lobby-table-header {
            display: grid;
            grid-template-columns: 2fr 1.2fr 1fr 80px;
            padding: 5px 10px;
            background: linear-gradient(to bottom, #142235, #0b1420);
            border: 1px solid #1c2e46; border-bottom: none;
            color: #7a9bbc; font-size: 11px; text-transform: uppercase; letter-spacing: 0.5px;
        }

        .lobby-table-body {
            flex: 1; overflow-y: auto; border: 1px solid #1c2e46;
        }

        .lobby-row {
            display: grid;
            grid-template-columns: 2fr 1.2fr 1fr 80px;
            padding: 9px 10px;
            border-bottom: 1px solid #0e1826;
            align-items: center; cursor: pointer;
            transition: background .1s;
        }
        .lobby-row:hover { background: rgba(200,170,110,0.06); }
        .lobby-row.selected { background: rgba(200,170,110,0.12); border-left: 2px solid #c8aa6e; }
        .lobby-row .name { color: #d5c9a3; font-size: 13px; font-weight: bold; }
        .lobby-row .host { color: #7a9bbc; font-size: 11px; }
        .lobby-row .map  { color: #8fa3b9; font-size: 11px; }
        .lobby-row .players { color: #c8aa6e; font-size: 12px; font-weight: bold; text-align: center; }

        .lobby-empty {
            padding: 40px; text-align: center; color: #3a5070; font-size: 13px;
        }

        .join-bar {
            margin-top: 12px; display: flex; justify-content: flex-end; gap: 10px;
        }

        /* ── OYUNCU DETAY PANELİ (sağda, lobi seçilince) ── */
        .detail-panel {
            width: 280px; display: flex; flex-direction: column;
            background: linear-gradient(to bottom, #09111c, #050a12);
            border-left: 1px solid #1c2e46; padding: 0;
        }
        .detail-title {
            padding: 8px 12px; font-size: 11px; color: #7a9bbc;
            text-transform: uppercase; letter-spacing: 1px;
            background: linear-gradient(to bottom, #142235, #0b1420);
            border-bottom: 1px solid #1c2e46;
        }
        .detail-name { padding: 12px; color: #e1d1a1; font-size: 16px; font-family: "FRQITC01", serif; border-bottom: 1px solid #1c2e46; }
        .detail-map { padding: 6px 12px; color: #8fa3b9; font-size: 12px; border-bottom: 1px solid #1c2e46; }
        .detail-players { flex: 1; overflow-y: auto; }
        .detail-player { padding: 8px 14px; border-bottom: 1px solid #0e1826; color: #a2b3c7; display: flex; align-items: center; gap: 8px; }
        .detail-player .crown { color: #c8aa6e; font-size: 14px; }
        .detail-placeholder { padding: 20px; text-align: center; color: #2a3f5a; font-size: 12px; }

        /* ── MODAL (Lobi Oluştur) ── */
        .modal-overlay {
            position: fixed; inset: 0; background: rgba(0,0,0,0.88);
            z-index: 1000; display: flex; align-items: center; justify-content: center;
            opacity: 0; pointer-events: none; transition: opacity .2s;
        }
        .modal-overlay.show { opacity: 1; pointer-events: auto; }
        .modal-box {
            background: #0e1420; border: 1px solid #3a4a5e;
            box-shadow: 0 0 30px rgba(0,0,0,0.9), 0 0 0 1px #000; width: 360px;
        }
        .modal-header {
            background: linear-gradient(to bottom, #243040, #131b26);
            border-bottom: 1px solid #1c2e46;
            padding: 10px 14px; font-size: 14px; color: #c8aa6e;
            font-family: "FRQITC01", serif; letter-spacing: 1px;
        }
        .modal-body { padding: 22px 18px; }
        .input-label { display: block; font-size: 11px; color: #8fa3b9; margin-bottom: 5px; text-transform: uppercase; letter-spacing: 0.5px; }
        .input-field {
            width: 100%; padding: 7px 10px; margin-bottom: 14px;
            background: #030609; border: 1px solid #2a3f5c;
            color: #c8aa6e; font-size: 13px; outline: none;
            font-family: Tahoma, Arial, sans-serif;
        }
        .input-field:focus { border-color: #c8aa6e; }
        .modal-footer {
            padding: 10px 14px; background: #080d14;
            border-top: 1px solid #1c2e46;
            display: flex; justify-content: flex-end; gap: 8px;
        }
        .lol-btn.cancel {
            background: linear-gradient(to bottom, #1a1e25, #0e1118);
            border-color: #3a414e; border-bottom-color: #8fa3b9; color: #8fa3b9;
        }
        .lol-btn.success {
            background: linear-gradient(to bottom, #1a4220, #0a2110);
            border-color: #2d6e35; border-bottom-color: #46c846; color: #7fd87f;
        }

        /* ── BOTTOM ── */
        .bottom-border {
            height: 24px;
            background: url("assets/border_bottom.png") repeat-x center, linear-gradient(to bottom, #0f1722, #070b10);
            border-top: 1px solid #233144; flex-shrink: 0;
        }

        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-thumb { background: #1c324d; }
        ::-webkit-scrollbar-track { background: #050a12; }
    </style>
</head>
<body>

<!-- Lobi Oluştur Modal -->
<div class="modal-overlay" id="createModal">
    <div class="modal-box">
        <div class="modal-header">⚔ Create Custom Game</div>
        <div class="modal-body">
            <label class="input-label">Lobi Adı</label>
            <input class="input-field" type="text" id="lobbyNameInput" placeholder="Örn: Ranked Practice #1">
            <label class="input-label">Harita</label>
            <select class="input-field" id="lobbyMapSelect">
                <option value="1">Summoner's Rift</option>
                <option value="4">The Twisted Treeline</option>
                <option value="30">Howling Abyss</option>
                <option value="8">The Crystal Scar</option>
            </select>
        </div>
        <div class="modal-footer">
            <button class="lol-btn cancel" id="btnCancelCreate">İptal</button>
            <button class="lol-btn success" id="btnConfirmCreate">Oluştur</button>
        </div>
    </div>
</div>

<div class="top-border">
    <span>League of Legends 1.64.12_08_06_19_20</span>
    <div class="window-controls">
        <button class="win-btn" id="btnMin">−</button>
        <button class="win-btn" id="btnClose">X</button>
    </div>
</div>

<header class="header">
    <h2>⚔ Custom Game</h2>
    <div class="header-actions">
        <button class="lol-btn" id="btnRefresh">↺ Yenile</button>
        <button class="lol-btn" id="btnCreateLobby">+ Oluştur</button>
        <button class="lol-btn danger" id="btnBack">← Geri</button>
    </div>
</header>

<div class="body">
    <!-- Lobi Listesi -->
    <div class="lobby-list-panel">
        <div class="list-toolbar">
            <span>Mevcut Lobiler</span>
            <span id="lobbyCount" style="color:#4b6a8b">— adet</span>
        </div>

        <div class="lobby-table-header">
            <div>Lobi Adı</div>
            <div>Host</div>
            <div>Harita</div>
            <div style="text-align:center">Oyuncular</div>
        </div>

        <div class="lobby-table-body" id="lobbyTableBody">
            <div class="lobby-empty">Yükleniyor...</div>
        </div>

        <div class="join-bar">
            <button class="lol-btn" id="btnJoin" disabled style="opacity:.4">Lobiye Katıl</button>
        </div>
    </div>

    <!-- Sağ: Seçili lobilerin detayları -->
    <div class="detail-panel" id="detailPanel">
        <div class="detail-title">Lobi Detayı</div>
        <div class="detail-placeholder" id="detailPlaceholder">
            Sol taraftan bir lobi seçin.
        </div>
        <div id="detailContent" style="display:none; flex:1; flex-direction:column; overflow:hidden; display:none;">
            <div class="detail-name" id="detailName"></div>
            <div class="detail-map" id="detailMap"></div>
            <div class="detail-title" style="margin-top:4px">Oyuncular</div>
            <div class="detail-players" id="detailPlayerList"></div>
        </div>
    </div>
</div>

<!-- Lobi içi görünüm (bir lobiye katılınca gösterilir) -->
<!-- (lobby-inner gizli başlar, join/create sonrası açılır) -->

<div class="bottom-border"></div>

<script src="scripts/socket-manager.js"></script>
<script>
    const $ = id => document.getElementById(id);
    $('btnMin').addEventListener('click', () => window.electron.window.minimize());
    $('btnClose').addEventListener('click', () => window.electron.window.close());

    const mapNames = { 1: "Summoner's Rift", 4: "Twisted Treeline", 30: "Howling Abyss", 8: "Crystal Scar" };

    let currentUser = null;
    let lobbies = [];
    let selectedLobby = null;

    // Kullanıcıyı yükle
    try { currentUser = JSON.parse(localStorage.getItem('user')); } catch(e) {}

    // ── LOBİ LİSTESİNİ ÇEK ──
    async function loadLobbies() {
        $('lobbyTableBody').innerHTML = '<div class="lobby-empty">Yükleniyor...</div>';
        const result = await window.electron.lobby.getAll();
        lobbies = result.success ? result.lobbies : [];
        renderLobbies();
    }

    function renderLobbies() {
        $('lobbyCount').textContent = `${lobbies.length} adet`;
        const body = $('lobbyTableBody');
        body.innerHTML = '';

        if (lobbies.length === 0) {
            body.innerHTML = '<div class="lobby-empty">Henüz açık lobi yok.<br>İlk lobiyi sen oluştur!</div>';
            return;
        }

        lobbies.forEach(lobby => {
            const row = document.createElement('div');
            row.className = 'lobby-row' + (selectedLobby && selectedLobby.name === lobby.name ? ' selected' : '');
            row.innerHTML = `
                <div class="name">${lobby.name}</div>
                <div class="host">${lobby.host}</div>
                <div class="map">${mapNames[lobby.mapId] || 'Custom'}</div>
                <div class="players">${lobby.players.length} / 10</div>
            `;
            row.addEventListener('click', () => selectLobby(lobby));
            body.appendChild(row);
        });

        // Polling sırasında seçili lobinin detay panelini de güncel tut
        // (oyuncu sayısı/listesi değişmiş olabilir).
        if (selectedLobby) {
            const fresh = lobbies.find(l => l.name === selectedLobby.name);
            if (fresh) {
                selectedLobby = fresh;
                refreshDetailPanel(fresh);
            } else {
                // Lobi artık yok (kapandı/oyuna geçti) — seçim sıfırlanır.
                selectedLobby = null;
                $('detailPlaceholder').style.display = 'block';
                $('detailContent').style.display = 'none';
                $('btnJoin').disabled = true;
                $('btnJoin').style.opacity = '.4';
            }
        }
    }

    function selectLobby(lobby) {
        selectedLobby = lobby;
        renderLobbies(); // satırı seçili göster
        refreshDetailPanel(lobby);

        const btnJoin = $('btnJoin');
        btnJoin.disabled = false;
        btnJoin.style.opacity = '1';
    }

    // Detay panelini (lobi adı, harita, oyuncu listesi) verilen lobi ile doldurur.
    // Hem ilk seçimde hem de polling sırasında aynı paneli güncel tutmak için kullanılır.
    function refreshDetailPanel(lobby) {
        $('detailPlaceholder').style.display = 'none';
        const content = $('detailContent');
        content.style.display = 'flex';
        content.style.flexDirection = 'column';

        $('detailName').textContent = lobby.name;
        $('detailMap').textContent = '🗺 ' + (mapNames[lobby.mapId] || 'Custom');

        const playerList = $('detailPlayerList');
        playerList.innerHTML = '';
        (lobby.players || []).forEach(p => {
            const div = document.createElement('div');
            div.className = 'detail-player';
            div.innerHTML = `${p.isHost ? '<span class="crown">♛</span>' : '<span style="width:14px;display:inline-block"></span>'} ${p.name}`;
            playerList.appendChild(div);
        });
    }

    // ── LOBİYE KATIL: artık lobi ADI ile yapılıyor, _id dönüşümü gerekmiyor ──
    $('btnJoin').addEventListener('click', async () => {
        if (!selectedLobby || !currentUser) return;
        const result = await window.electron.lobby.join(selectedLobby.name, currentUser.summonerName);
        if (result.success) {
            localStorage.setItem('currentLobby', JSON.stringify(result.lobby));
            openLobbyRoom(result.lobby);
        } else {
            alert('Katılamadı: ' + result.message);
        }
    });

    // ── YENİLE ──
    $('btnRefresh').addEventListener('click', loadLobbies);

    // ── GERİ ──
    $('btnBack').addEventListener('click', () => window.electron.navigate('home.html'));

    // ── LOBİ OLUŞTUR MODAL ──
    $('btnCreateLobby').addEventListener('click', () => $('createModal').classList.add('show'));
    $('btnCancelCreate').addEventListener('click', () => $('createModal').classList.remove('show'));

    $('btnConfirmCreate').addEventListener('click', async () => {
        const name = $('lobbyNameInput').value.trim();
        const mapId = parseInt($('lobbyMapSelect').value);
        if (!name) return alert('Lütfen bir lobi adı girin.');
        if (!currentUser) return alert('Kullanıcı bulunamadı, tekrar giriş yapın.');

        $('btnConfirmCreate').textContent = '...';
        $('btnConfirmCreate').disabled = true;

        const result = await window.electron.lobby.create({ name, mapId, host: currentUser.summonerName });

        $('btnConfirmCreate').textContent = 'Oluştur';
        $('btnConfirmCreate').disabled = false;

        if (result.success) {
            $('createModal').classList.remove('show');
            localStorage.setItem('currentLobby', JSON.stringify(result.lobby));
            openLobbyRoom(result.lobby);
        } else {
            alert('Hata: ' + result.message);
        }
    });

    // ── LOBİ ODASI GÖRÜNÜMÜNE GEÇ ──
    // Sayfa değiştirmek yerine in-page geçiş yapıyoruz ki bağlantı kopmasa
    function openLobbyRoom(lobby) {
        // Pencere beklenmedik kapanırsa main process'in hangi lobiden
        // çıkış yapacağını bilmesi için aktif lobiyi bildir.
        if (window.electron.lobby.setActive && currentUser) {
            window.electron.lobby.setActive(lobby.name, currentUser.summonerName);
        }

        // Lobi sayfasına navigate et
        window.electron.navigate('lobby-room.html');
    }

    // ── REALTIME GÜNCELLEME ──
    // main.js, lobi create/join/leave işlemlerinde 'lobby:list:changed'
    // event'i yayınlıyor; tek makinede bağlıyken anında yeniler.
    if (typeof SocketManager !== 'undefined') {
        SocketManager.on('lobby:list:changed', () => loadLobbies());
    }

    // ── POLLING (asıl güncelleme kaynağı) ──
    // Her oyuncu kendi makinesinde ayrı bir Electron penceresi çalıştırdığı için
    // mainWindow.webContents.send sadece kendi ekranına ulaşır, diğer
    // bilgisayarlara gitmez. Bu yüzden ortak MongoDB üzerinden periyodik
    // sorgu (2 sn) asıl senkronizasyon kaynağıdır; yukarıdaki socket event'i
    // sadece aynı makinedeyken anlık tepki için ek bir hızlandırıcı.
    setInterval(loadLobbies, 2000);

    // ── BAŞLAT ──
    loadLobbies();
</script>
</body>
</html>
